<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shop brand products — orderWITHa4">
  <title id="page-title">Brand Products | orderWITHa4</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .brand-hero {
      padding: 150px 0 60px;
      text-align: center;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }
    .brand-hero h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      margin-bottom: 16px;
      text-transform: capitalize;
    }
    .brand-hero p {
      color: var(--text-secondary);
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 1.1rem;
    }
    .cat-icon-placeholder {
      font-size: 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      background: var(--bg-secondary);
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="index.html" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" stroke="url(#logo-grad)" stroke-width="2" />
            <path d="M20 8L12 28H16L18 23H22L24 28H28L20 8ZM20 12L21.5 19H18.5L20 12Z" fill="white" />
            <path d="M22 23V28" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <defs>
              <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
                <stop stop-color="#00d4ff"/>
                <stop offset="1" stop-color="#7b61ff"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span>order</span>WITHa4
      </a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html#home">Home</a></li>
        <li><a href="index.html#products">Brands</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
      <div class="nav-search" id="navSearch">
        <input type="text" id="searchInput" placeholder="Search brands...">
        <span class="search-icon">🔍</span>
      </div>
      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <!-- ===== BRAND HERO ===== -->
  <section class="brand-hero">
    <div class="container fade-in">
      <h1 id="brand-name">Brand Name</h1>
      <p id="brand-summary">Loading products...</p>
    </div>
  </section>

  <!-- ===== PRODUCTS ===== -->
  <section class="section" id="products">
    <div class="container">
      <div class="products-grid" id="products-container">
        <!-- Products injected via JS -->
      </div>
    </div>
  </section>

  <!-- ===== CART DRAWER ===== -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h3 style="display:flex; align-items:center;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="22" height="22" style="margin-right:10px; color:#00d4ff;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        Your Cart
      </h3>
      <div style="display: flex; align-items: center; gap: 15px;">
        <button id="clearCartBtn" style="background: none; border: none; color: #ff4757; text-decoration: underline; cursor: pointer; font-size: 0.85rem; font-weight: 600; display: none; align-items:flex-end;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" style="margin-right:4px;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
          Clear
        </button>
        <button class="close-cart" id="closeCart">&times;</button>
      </div>
    </div>
    <div class="cart-items" id="cartItems">
      <p class="empty-cart-msg">Your cart is empty.</p>
    </div>
    <div class="cart-footer">
      <div class="cart-summary-group">
        <div class="summary-row">
          <span>Subtotal (M.R.P):</span>
          <span id="cartSubtotal">Rs. 0</span>
        </div>
        <div class="summary-row savings" id="cartSavingsRow" style="display: none;">
          <span>You Save:</span>
          <span id="cartSavingsDisplay">- Rs. 0</span>
        </div>
        <div class="summary-row total">
          <span>Total Payable:</span>
          <span id="cartTotalDisplay">Rs. 0</span>
        </div>
      </div>
      <div style="display: flex; flex-direction: column; gap: 10px;">
        <button class="btn-checkout" id="checkoutBtn">
          Order All via WhatsApp 
          <svg viewBox="0 0 24 24" fill="none" class="premium-icon" xmlns="http://www.w3.org/2000/svg" style="margin-left: 8px;">
            <path d="M1 1H4L6.68 14.39C6.80 15.35 7.62 16 8.59 16H18.51C19.48 16 20.30 15.35 20.42 14.39L22 6H5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="9" cy="20" r="1.5" fill="currentColor"/>
            <circle cx="18" cy="20" r="1.5" fill="currentColor"/>
          </svg>
        </button>
        <button class="btn-checkout btn-pay-online" id="payOnlineBtn">Pay Online (Card/Genie) 💳</button>
      </div>
    </div>
  </div>

  <!-- ===== FLOATING CART BUTTON ===== -->
  <button class="floating-cart" id="floatingCart">
    <span class="cart-icon">
      <svg viewBox="0 0 24 24" fill="none" class="premium-icon" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 1H4L6.68 14.39C6.80 15.35 7.62 16 8.59 16H18.51C19.48 16 20.30 15.35 20.42 14.39L22 6H5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="9" cy="20" r="1.5" fill="currentColor"/>
        <circle cx="18" cy="20" r="1.5" fill="currentColor"/>
      </svg>
    </span>
    <span class="cart-badge" id="cartBadge">0</span>
  </button>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom" style="border-top: none; padding-top: 0;">
        <p>&copy; 2026 orderWITHa4. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="products.js"></script>
  <script src="script.js"></script>
  <script type="text/javascript" src="https://www.payhere.lk/lib/payhere.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Robust Local Data Sync (Admin Dashboard -> Storefront)
      if (localStorage.getItem('orderWITHa4_local_products')) {
        try {
          products = JSON.parse(localStorage.getItem('orderWITHa4_local_products'));
        } catch(e) {}
      }
      if (localStorage.getItem('orderWITHa4_local_brands')) {
        try {
          brands = JSON.parse(localStorage.getItem('orderWITHa4_local_brands'));
        } catch(e) {}
      }
      const urlParams = new URLSearchParams(window.location.search);
      const brandId = urlParams.get('id');

      if (!brandId) {
        document.getElementById('products-container').innerHTML = `<p class="empty-state">No brand selected. Go back to <a href="index.html" style="color:var(--accent)">Home</a>.</p>`;
        return;
      }

      // Filter products from global products array
      const brandProducts = products.filter(p => p.brand.toLowerCase() === brandId.toLowerCase());
      
      // Global Brands Lookup
      const brandInfo = brands.find(b => b.id.toLowerCase() === brandId.toLowerCase());

      if (brandInfo && brandInfo.logo) {
        document.getElementById('brand-name').innerHTML = `<img src="${brandInfo.logo}" alt="${brandInfo.name}" style="max-height: 120px; margin: 0 auto; display: block;">`;
      } else {
        document.getElementById('brand-name').textContent = brandInfo ? brandInfo.name : brandId;
      }
      
      document.getElementById('page-title').textContent = `${(brandInfo ? brandInfo.name : brandId).toUpperCase()} Products | orderWITHa4`;
      document.getElementById('brand-summary').textContent = brandInfo ? brandInfo.description : 'Explore our collection';

      const container = document.getElementById('products-container');
      
      function renderBrandProducts(searchQuery = '') {
        const hero = document.querySelector('.brand-hero');
        if (hero) hero.style.display = searchQuery ? 'none' : 'block';

        let filtered = brandProducts;
        if (searchQuery) {
          const s = searchQuery.toLowerCase();
          filtered = brandProducts.filter(p => {
            const itemVal = (p.item || "").toLowerCase();
            const descVal = (p.description || "").toLowerCase();
            let m = itemVal.includes(s) || descVal.includes(s);
            if (!m && p.variants) {
              m = p.variants.some(v => (v.name || "").toLowerCase().includes(s));
            }
            return m;
          });
        }

        if (filtered.length === 0) {
          container.innerHTML = `<div class="empty-state" style="text-align:center; padding:100px 20px;">
                                   <h3 style="color:var(--text-secondary)">No results found for "${searchQuery}" in this brand.</h3>
                                 </div>`;
          return;
        }

        let html = '';
        filtered.forEach((prod) => {
          html += window.createProductCardHtml(prod, prod.index);
        });
 
         container.innerHTML = html;
        
        setTimeout(() => {
          document.querySelectorAll('.product-card').forEach(el => el.classList.add('visible'));
        }, 100);
      }

      renderBrandProducts();

      const searchInput = document.getElementById('searchInput');
      if (searchInput) {
        searchInput.addEventListener('input', (e) => {
          renderBrandProducts(e.target.value.trim());
        });
      }
    });

    // Standard logic now provided by script.js

  </script>
</body>
</html>
